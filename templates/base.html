<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Блог{% endblock %}</title>
</head>
<body>
    <header>
        <a href="{% url 'post_list' %}">Блог</a>
        <nav>
            {% if user.is_authenticated %}
                <a href="{% url 'post_create' %}">Нова стаття</a>
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit">Вийти ({{ user.username }})</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Увійти</a>
            {% endif %}
        </nav>
        <form method="get" action="{% url 'post_search' %}">
            <input type="text" name="q" placeholder="Пошук...">
            <button type="submit">Шукати</button>
        </form>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; {% now "Y" %} Блог</p>
    </footer>
</body>
</html>
