<body>
    <form method="post" action="/accounts/logout/">
        {% csrf_token %}
        <button type="submit">Вийти</button>
    </form>

    <h1>Всі статті</h1>

    {% for post in posts %}
        <h2>{{ post.title }}</h2>
        <p>{{ post.created_at }}</p>
        <a href="/blog/{{ post.slug }}/">Читати</a>
        <hr>
    {% endfor %}

</body>
